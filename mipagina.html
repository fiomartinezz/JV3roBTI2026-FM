<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-200">

  <div class="w-[800px] ml-4">

    <div class="flex bg-pink-400 text-white p-2 mt-4 justify-between rounded-md">
      <div onclick="inicio()" class="hover:bg-pink-500 px-2 cursor-pointer rounded">Inicio</div>
      <div class="hover:bg-pink-500 px-2 cursor-pointer rounded">Menu</div>
      <div class="hover:bg-pink-500 px-2 cursor-pointer rounded">Nombre</div>
      <div class="hover:bg-pink-500 px-2 cursor-pointer rounded">Apellido</div>
      <div class="hover:bg-pink-500 px-2 cursor-pointer rounded">TuttiFrutti</div>
    </div>

    <div class="flex mt-3">
      
      <div class="w-1/4 flex flex-col gap-2">
        <div onclick="cambiar('DO')" class="bg-blue-200 p-2 cursor-pointer hover:bg-blue-300 rounded">
          Sección 1
        </div>
        <div onclick="cambiar('RE')" class="bg-blue-200 p-2 cursor-pointer hover:bg-blue-300 rounded">
          Sección 2
        </div>
        <div onclick="cambiar('MI')" class="bg-blue-200 p-2 cursor-pointer hover:bg-blue-300 rounded">
          Sección 3
        </div>
        <div onclick="cambiar('FA')" class="bg-blue-200 p-2 cursor-pointer hover:bg-blue-300 rounded">
          Sección 4
        </div>
        <div onclick="cambiar('SOL')" class="bg-blue-200 p-2 cursor-pointer hover:bg-blue-300 rounded">
          Sección 5
        </div>
      </div>
      <div id="contenido" class="bg-orange-100 p-3 ml-2 flex-1 rounded">
        Elegí una sección
      </div>
    </div>
    <div class="bg-gray-400 text-center mt-3 p-2 rounded">
      footer
    </div>

  </div>

  <script>
    function cambiar(texto){
      document.getElementById("contenido").innerHTML = texto;
    }
  </script>

  <script>
  function cambiar(texto){
    document.getElementById("contenido").innerHTML = texto;
  }
  function inicio(){
    document.getElementById("contenido").innerHTML = "Hola";
  }
</script>

</body>
</html>
