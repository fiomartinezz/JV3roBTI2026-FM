<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas y ciclos</title>
    <style>
        table{width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        th{background-color: #4a90e2; color: white; padding: 12px; text-align: left;}
        td{padding: 12px; border-bottom: 1px solid #eee;}
        tr:hover{background-color: #f1f7ff;}
        .status-ok{color: green; font-weight: bold;}
        .status-low{color: orange; font-weight: bold;}
    </style>
</head>
<body>
    <h2>Panel de inventario</h2>
    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Id</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="cuerpoDeTabla">
        </tbody>
    </table>
    <hr>
    <table id="tablaVentas">
        <thead>
            <tr>
                <th>Id</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoVentas">
        </tbody>
    </table>
    <script>
        // 1. Lista de ventas de ferreteria
        const ventas = [
            {id: 150, producto: 'Martillo', precio: 150, vendedor: 'Danilo'},
            {id: 151, producto: 'Serrucho', precio: 50, vendedor: 'Fiorella'},
            {id: 152, producto: 'Machete', precio: 80, vendedor: 'Fabrizio'},
            {id: 153, producto: 'Clavo', precio: 20, vendedor: 'Matias'},
            {id: 154, producto: 'Pinza', precio: 250, vendedor: 'Florencia'},
            {id: 155, producto: 'Linja', precio: 5, vendedor: 'Nahuel'},
        ];
        const insertarDatos = document.getElementById('cuerpoVentas');
        for(let data in ventas){
            const item = ventas[data];
            const fila1 = document.createElement('tr');
            fila1.innerHTML = `
            <td>${item.id}</td>
            <td>${item.producto}</td>
            <td>${item.precio}</td>
            <td>${item.vendedor}</td>
            <td><button class="btn-borrar">Eliminar</button></td>
            `;

            // Add funcionalidad al button
            const boton = fila1.querySelector('.btn-borrar');
            boton.onclick = function(){
                const confirmar = confirm('Seguro que quieres eliminar ' + item.nombre);
                if(confirmar){
                    fila1.remove();
                }
            }
            insertarDatos.appendChild(fila1);
        }
    </script>
    <script>
        // 1. Datos del ejercicio  
        const productos = [
            {id: 100, nombre: 'Teclado', precio: 85, stock: 12},
            {id: 101, nombre: 'Mouse inalambrico', precio: 45, stock: 0},
            {id: 102, nombre: 'Monitor de 32 pulgadas', precio: 150, stock: 5},
            {id: 103, nombre: 'Auricular gamer', precio: 60, stock: 8},
            {id: 104, nombre: 'Microfono', precio: 110, stock: 10},
            {id: 105, nombre: 'Mouspad', precio: 88, stock: 2},
            {id: 106, nombre: 'Adaptador USB-C a RJ45', precio: 220, stock: 3}
        ];
        // 2. Seleccionar el cuerpo de la tabla
        const tbody = document.getElementById('cuerpoDeTabla');
        // 3. Generar las filas y las celdas (tr & td)
        for(celda in productos){
            const item = productos[celda];
            // crear las celdas
            const fila = document.createElement('tr');
            //crear celdas y add datos
            const celdaId = document.createElement('td');
            celdaId.textContent = item.id;

            const celdaNombre = document.createElement('td');
            celdaNombre.textContent = item.nombre;

            const celdaPrecio = document.createElement('td');
            celdaPrecio.textContent = item.precio;

            const celdaStock = document.createElement('td');
            celdaStock.textContent = item.stock;

            // Para stock bajo
            if(item.stock < 3){
                celdaStock.className = 'status-low';
            }else{
                celdaStock.className = 'status-ok';
            }

            // add elementos a cada fila
            fila.appendChild(celdaId);
            fila.appendChild(celdaNombre);
            fila.appendChild(celdaPrecio);
            fila.appendChild(celdaStock);
            // add la fila al cuerpo de la tabla
            tbody.appendChild(fila);
        }
    </script>
</body>
</html>
